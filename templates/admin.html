<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
</head>
<body>

    <h1>Все бронирования</h1>

    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Бокс</th>
            <th>Дата</th>
            <th>Время</th>
        </tr>

        {% for b in bookings %}
        <tr>
            <td>{{ b.id }}</td>
            <td>{{ b.name }}</td>
            <td>{{ b.phone }}</td>
            <td>{{ b.box }}</td>
            <td>{{ b.date }}</td>
            <td>{{ b.time }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/">← Назад</a>

</body>
</html>
