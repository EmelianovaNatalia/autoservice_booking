<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Бронирования</h2>
        <a href="/logout" class="btn btn-outline-danger">Выйти</a>
        <a href="/calendar" class="btn btn-outline-primary me-2">📅 Календарь</a>
    </div>

    <table class="table table-striped table-hover shadow-sm bg-white">
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Бокс</th>
            <th>Дата</th>
            <th>Время</th>
            <th>Действие</th>
        </tr>
        </thead>

        <tbody>
        {% for b in bookings %}
        <tr>
            <td>{{ b.id }}</td>
            <td>{{ b.name }}</td>
            <td>{{ b.phone }}</td>
            <td>{{ b.box }}</td>
            <td>{{ b.date }}</td>
            <td>{{ b.time }}</td>
            <td>
                <a href="/delete/{{ b.id }}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Удалить бронирование?')">
                    Удалить
                </a>
            </td>
        </tr>
        {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
