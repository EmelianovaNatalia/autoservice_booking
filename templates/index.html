<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Автосервис самообслуживания</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-4">
        <h1>🚗 Бронирование бокса</h1>
        <p class="text-muted">Выберите удобное время для ремонта автомобиля</p>
    </div>

    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">

        <form action="/book" method="POST">

            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Телефон</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Бокс</label>
                <select name="box" class="form-select" required>
                    <option value="Бокс 1">Бокс 1</option>
                    <option value="Бокс 2">Бокс 2</option>
                    <option value="Бокс 3">Бокс 3</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Дата</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Время</label>
                <input type="time" name="time" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Забронировать
            </button>

        </form>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
